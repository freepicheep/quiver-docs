title: Quiver

module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: Docs
      pageRef: /
      weight: 1
    - name: About
      pageRef: /about
      weight: 2
    - name: GitHub
      url: "https://github.com/freepicheep/quiver"
      weight: 3
      params:
        icon: github
    - name: Search
      weight: 4
      params:
        type: search

params:
  theme:
    default: system
    displayToggle: true

  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: false
    displayPoweredBy: true

  editURL:
    enable: true
    base: "https://github.com/freepicheep/quiver-docs/edit/main/content"
